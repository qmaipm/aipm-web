# 启盟科技官网 — Next.js (standalone) 单服务
# 镜像与环境无关;环境差异由 .env 注入(SITE_ENV / SITE_URL / AIPM_WEB_HOST_PORT)。
# 配合 qm-scripts 发布脚本(type=docker):pk/pb 会自动生成 .env 并 build/up。
# 本地手动用法:
#   echo -e "SITE_ENV=production\nSITE_URL=https://www.aipm.cn\nAIPM_WEB_HOST_PORT=3120" > .env
#   docker compose build && docker compose up -d
# 再由 nginx 把 www.aipm.cn(或 t1816-www.aipm.cn) 反代到 127.0.0.1:${AIPM_WEB_HOST_PORT}

services:
  web:
    build:
      context: .
    image: aipm-web:latest
    restart: unless-stopped
    # 运行时变量经 pb 生成的 .env 做 ${} 插值后,在此显式注入容器(服务端 env,不下发浏览器)。
    # 非密钥(SITE_*/SMTP_HOST/PORT/MAIL_*)来自 conf;密钥(SMTP_USER/PASS/WECHAT_*)来自部署机 secrets 文件。
    environment:
      SITE_ENV: "${SITE_ENV}"
      SITE_URL: "${SITE_URL}"
      SMTP_HOST: "${SMTP_HOST:-smtp.qiye.aliyun.com}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      MAIL_TO: "${MAIL_TO:-}"
      MAIL_CC: "${MAIL_CC:-}"
      WECHAT_APPID: "${WECHAT_APPID:-}"
      WECHAT_APPSECRET: "${WECHAT_APPSECRET:-}"
    ports:
      - "${AIPM_WEB_HOST_PORT}:3000"
