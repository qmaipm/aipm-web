<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    position:relative;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","Noto Sans CJK SC",sans-serif;
    background:#FFFFFF;color:#14201C;
    display:flex;align-items:center;justify-content:center;
  }
  /* hero 同款细网格 */
  .grid{position:absolute;inset:0;
    background-image:linear-gradient(to right,rgba(12,139,130,.13) 1px,transparent 1px),
                     linear-gradient(to bottom,rgba(12,139,130,.13) 1px,transparent 1px);
    background-size:56px 56px;
    -webkit-mask-image:radial-gradient(ellipse 90% 85% at 50% 50%,#000 40%,transparent 100%);
  }
  /* 蓝绿柔光(角落,不进安全区) */
  .glow-a{position:absolute;width:520px;height:520px;left:-180px;top:-200px;border-radius:50%;
    background:radial-gradient(circle,rgba(0,112,255,.10),transparent 66%)}
  .glow-b{position:absolute;width:560px;height:560px;right:-200px;bottom:-230px;border-radius:50%;
    background:radial-gradient(circle,rgba(18,185,138,.12),transparent 66%)}
  /* 静态数据节点+连线(hero backdrop 的静帧,置于边缘) */
  svg.nodes{position:absolute;inset:0;width:100%;height:100%}
  /* 中央安全区内容 */
  .stage{position:relative;z-index:2;text-align:center;max-width:900px;padding-bottom:8px}
  .kicker{display:inline-flex;align-items:center;gap:10px;font-size:19px;font-weight:600;
    letter-spacing:.16em;color:#12B98A;margin-bottom:30px}
  .kicker::before,.kicker::after{content:"";width:26px;height:2.5px;border-radius:2px;
    background:linear-gradient(115deg,#0070FF,#12B98A)}
  h1{font-size:84px;font-weight:800;letter-spacing:-.02em;line-height:1.12;color:#14201C}
  h1 .hl{background:linear-gradient(115deg,#0070FF,#12B98A);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{margin-top:26px;font-size:30px;font-weight:500;letter-spacing:.02em;color:#46524D}
  .brands{margin-top:56px;display:flex;align-items:center;justify-content:center;gap:34px}
  .brands img{height:58px;width:auto;display:block}
  .brands .sep{width:1.5px;height:44px;background:#E6EAE8;border-radius:2px}
  .fmclaw{font-size:38px;font-weight:800;letter-spacing:-.01em;
    background:linear-gradient(115deg,#0070FF,#12B98A);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .fmclaw sup{font-size:18px;font-weight:700;-webkit-text-fill-color:#12B98A;vertical-align:super}
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-a"></div>
  <div class="glow-b"></div>
  <svg class="nodes" viewBox="0 0 1200 630" fill="none" aria-hidden="true">
    <!-- 左上簇 -->
    <line x1="70" y1="90" x2="160" y2="150" stroke="rgba(0,112,255,.18)" stroke-width="1"/>
    <line x1="160" y1="150" x2="110" y2="240" stroke="rgba(0,112,255,.14)" stroke-width="1"/>
    <line x1="160" y1="150" x2="250" y2="105" stroke="rgba(18,185,138,.18)" stroke-width="1"/>
    <circle cx="70" cy="90" r="3.5" fill="rgba(0,112,255,.55)"/>
    <circle cx="160" cy="150" r="4.5" fill="rgba(0,112,255,.65)"/>
    <circle cx="110" cy="240" r="3" fill="rgba(18,185,138,.55)"/>
    <circle cx="250" cy="105" r="3" fill="rgba(18,185,138,.5)"/>
    <!-- 右上簇 -->
    <line x1="1050" y1="80" x2="1130" y2="140" stroke="rgba(18,185,138,.18)" stroke-width="1"/>
    <line x1="1130" y1="140" x2="1060" y2="205" stroke="rgba(0,112,255,.14)" stroke-width="1"/>
    <circle cx="1050" cy="80" r="3.5" fill="rgba(18,185,138,.6)"/>
    <circle cx="1130" cy="140" r="4.5" fill="rgba(0,112,255,.6)"/>
    <circle cx="1060" cy="205" r="3" fill="rgba(0,112,255,.5)"/>
    <!-- 左下簇 -->
    <line x1="90" y1="500" x2="170" y2="555" stroke="rgba(0,112,255,.14)" stroke-width="1"/>
    <circle cx="90" cy="500" r="3" fill="rgba(0,112,255,.5)"/>
    <circle cx="170" cy="555" r="4" fill="rgba(18,185,138,.55)"/>
    <!-- 右下簇 -->
    <line x1="1040" y1="480" x2="1120" y2="540" stroke="rgba(18,185,138,.16)" stroke-width="1"/>
    <line x1="1120" y1="540" x2="1055" y2="585" stroke="rgba(0,112,255,.13)" stroke-width="1"/>
    <circle cx="1040" cy="480" r="3.5" fill="rgba(0,112,255,.55)"/>
    <circle cx="1120" cy="540" r="4.5" fill="rgba(18,185,138,.6)"/>
    <circle cx="1055" cy="585" r="3" fill="rgba(0,112,255,.5)"/>
  </svg>
  <div class="stage">
    <p class="kicker">物业与设施管理的 AI 操作系统</p>
    <h1>让智能，<span class="hl">走进物理世界</span></h1>
    <p class="sub">让 AI，真正在物业与设施管理里干活</p>
    <div class="brands">
      <img src="logo.png" alt="启盟科技 Stalliance">
      <span class="sep"></span>
      <span class="fmclaw">FMClaw<sup>™</sup></span>
    </div>
  </div>
</body>
</html>
